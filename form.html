<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Submit a product review for our store." />
  <title>Product Review</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>

  <header class="site-header">
    <h1>Product Review</h1>
  </header>

  <main class="form-wrapper">
    <form id="reviewForm" method="get" action="review.html" novalidate>

      <div class="field-group">
        <label for="productName">Product Name</label>
        <select id="productName" name="productName" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>
      </div>

      <fieldset class="field-group rating-fieldset">
        <legend>Overall Rating</legend>
        <div class="star-row">
          <label for="rating1" class="star-label">
            <span>&#9733;</span>
            <input type="radio" id="rating1" name="rating" value="1" required />
          </label>
          <label for="rating2" class="star-label">
            <span>&#9733;&#9733;</span>
            <input type="radio" id="rating2" name="rating" value="2" />
          </label>
          <label for="rating3" class="star-label">
            <span>&#9733;&#9733;&#9733;</span>
            <input type="radio" id="rating3" name="rating" value="3" />
          </label>
          <label for="rating4" class="star-label">
            <span>&#9733;&#9733;&#9733;&#9733;</span>
            <input type="radio" id="rating4" name="rating" value="4" />
          </label>
          <label for="rating5" class="star-label">
            <span>&#9733;&#9733;&#9733;&#9733;&#9733;</span>
            <input type="radio" id="rating5" name="rating" value="5" />
          </label>
        </div>
      </fieldset>

      <div class="field-group">
        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required />
      </div>

      <fieldset class="field-group checkbox-fieldset">
        <legend>Which features did you find useful in the product? <em>(Check all that apply)</em></legend>
        <label class="checkbox-label">
          <input type="checkbox" id="durability" name="features" value="Durability" />
          Durability
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="easeOfUse" name="features" value="Ease of Use" />
          Ease of Use
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="performance" name="features" value="Performance" />
          Performance
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="design" name="features" value="Design" />
          Design
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="valueForMoney" name="features" value="Value for Money" />
          Value for Money
        </label>
      </fieldset>

      <div class="field-group">
        <label for="writtenReview">Written Review <span class="optional">(Optional)</span></label>
        <textarea id="writtenReview" name="writtenReview" rows="5" placeholder="Share your experience with this product..."></textarea>
      </div>

      <div class="field-group">
        <label for="userName">Ivan Gonzalez <span class="optional">(Optional)</span></label>
        <input type="text" id="userName" name="userName" placeholder="e.g. Jane Smith" />
      </div>

      <div class="field-group">
        <input type="submit" value="Post Review" class="btn-submit" />
      </div>

    </form>
  </main>

  <footer class="site-footer">
    <p>
      &copy;2026 &#127801; Ivan Gonzalez &#127801;<br />
      Last Modification: <span id="lastMod"></span>
    </p>
  </footer>

  <script src="form.js"></script>
</body>
</html>
